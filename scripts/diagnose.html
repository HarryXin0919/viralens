<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>viralens · 完整报告</title>
<script>/* 防闪烁:首帧前定好昼夜(默认按本地时间 7-19 = 浅色) */
(function(){var t=localStorage.getItem('theme');if(t!=='light'&&t!=='dark'){var h=new Date().getHours();t=(h>=7&&h<19)?'light':'dark';}document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --brand:#FD4E63; --brand-ink:#D5344E; --brand2:#FF3B3B;
    --grad:linear-gradient(135deg,#FB7299 0%,#FF3B3B 100%);
    --brand-soft:rgba(253,78,99,.12);
    --bili:#FB7299; --yt:#FF0000; --ok:#1F9D55; --warn:#D98324;
    --ink:#15181C; --muted:#6A7480; --faint:#9AA4AD;
    --line:#EAEDF0; --card:#FFFFFF; --bg:#F6F7F9;
    --nav-bg:rgba(255,255,255,.82);
    --input-bg:#FFFFFF; --code-bg:#F0F2F4;
    --thumb-bg:linear-gradient(135deg,#E6EAEE,#CFD6DD);
    --radius:18px;
    --shadow:0 1px 2px rgba(15,20,25,.04),0 18px 40px -30px rgba(15,20,25,.28);
    --shadow-hover:0 6px 14px rgba(15,20,25,.07),0 26px 50px -28px rgba(15,20,25,.35);
    --hero-glow:rgba(253,78,99,.28);
    --hero-bg:linear-gradient(180deg,#FFF0F4 0%,#F6F7F9 86%);
    --good-soft:rgba(31,157,85,.12); --warn-soft:rgba(217,131,36,.13);
  }
  html[data-theme="dark"]{
    --brand:#FF6E83; --brand-ink:#FF6E83; --brand2:#FF5A5A;
    --grad:linear-gradient(135deg,#FF8FB0 0%,#FF5A5A 100%);
    --brand-soft:rgba(255,110,131,.16);
    --bili:#FF8FB0; --yt:#FF4D4D; --ok:#37C871; --warn:#F3B24E;
    --ink:#EDF0F3; --muted:#9BA7B3; --faint:#6C7783;
    --line:#262C34; --card:#181C22; --bg:#0F1216;
    --nav-bg:rgba(18,22,26,.80);
    --input-bg:#1E232B; --code-bg:#222831;
    --thumb-bg:linear-gradient(135deg,#222831,#181C22);
    --shadow:0 1px 2px rgba(0,0,0,.35),0 18px 40px -30px rgba(0,0,0,.7);
    --shadow-hover:0 6px 14px rgba(0,0,0,.4),0 26px 50px -28px rgba(0,0,0,.82);
    --hero-glow:rgba(255,90,110,.20);
    --hero-bg:linear-gradient(180deg,#1A1320 0%,#0F1216 90%);
    --good-soft:rgba(55,200,113,.13); --warn-soft:rgba(243,178,78,.15);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:"Roboto","Noto Sans SC","PingFang SC","Microsoft YaHei",system-ui,-apple-system,sans-serif;
    color:var(--ink);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  a{color:inherit;text-decoration:none}
  html.theme-transition,html.theme-transition *{transition:background-color .5s ease,color .5s ease,border-color .5s ease,fill .5s ease,stroke .5s ease,box-shadow .5s ease !important}
  .hero,.wrap{transition:opacity .2s ease}
  body.lswitch .hero,body.lswitch .wrap{opacity:.25}

  /* nav (与控制台一致) */
  .nav{position:sticky;top:0;z-index:40;background:var(--nav-bg);backdrop-filter:saturate(180%) blur(14px);
    -webkit-backdrop-filter:saturate(180%) blur(14px);border-bottom:1px solid var(--line)}
  .nav-inner{max-width:1080px;margin:0 auto;height:60px;padding:0 22px;display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:11px}
  .brand .mark{width:30px;height:30px;flex:none;border-radius:9px;box-shadow:0 4px 12px -4px var(--brand)}
  .brand .bname{font-weight:900;font-size:19px;letter-spacing:-.02em}
  .brand .bname .hl{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .brand .chip{font-size:12px;background:var(--brand-soft);color:var(--brand-ink);font-weight:600;padding:2px 9px;border-radius:999px;margin-left:2px}
  .nav-tools{display:flex;align-items:center;gap:9px}
  .nav-back{font-size:13px;font-weight:600;color:var(--muted);padding:0 12px;height:38px;display:inline-flex;
    align-items:center;border:1px solid var(--line);border-radius:999px;background:var(--card);transition:border-color .15s,color .15s}
  .nav-back:hover{border-color:var(--brand);color:var(--ink)}
  .icon-btn{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;color:var(--ink);
    background:var(--card);border:1px solid var(--line);border-radius:999px;cursor:pointer;transition:border-color .15s,background .15s,transform .12s}
  .icon-btn:hover{border-color:var(--brand)} .icon-btn:active{transform:scale(.94)} .icon-btn svg{width:17px;height:17px}
  .lang-btn{display:inline-flex;align-items:center;gap:6px;font:inherit;font-size:13px;font-weight:700;color:var(--ink);
    background:var(--card);border:1px solid var(--line);border-radius:999px;padding:0 15px;height:38px;cursor:pointer;transition:border-color .15s}
  .lang-btn:hover{border-color:var(--brand)} .lang-btn svg{width:14px;height:14px;opacity:.7}

  /* hero */
  .hero{background:radial-gradient(620px 280px at 84% -30%,var(--hero-glow),transparent 72%),var(--hero-bg);border-bottom:1px solid var(--line)}
  .hero-inner{max-width:1080px;margin:0 auto;padding:46px 22px 38px}
  .hero h1{font-size:44px;font-weight:900;letter-spacing:-.04em;line-height:1}
  .hero h1 .hl{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero .desc{margin-top:12px;font-size:15px;color:var(--muted);max-width:680px;line-height:1.7}

  .wrap{max-width:1080px;margin:0 auto;padding:28px 22px 90px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:24px 26px;margin-bottom:20px;box-shadow:var(--shadow)}
  .card-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:6px}
  .sec-badge{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:9px;
    background:var(--brand-soft);color:var(--brand-ink);font-weight:900;font-size:15px;flex:none}
  .card-head h2{font-size:19px;font-weight:700;letter-spacing:-.01em}
  .sec-sub{font-size:13px;color:var(--muted);font-weight:500}

  /* picker: 创作者 | 视频 两栏 */
  .pick{display:grid;grid-template-columns:230px 1fr;gap:18px;margin-top:14px}
  @media(max-width:680px){.pick{grid-template-columns:1fr}}
  .pcol-h{font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:9px}
  .clist{display:flex;flex-direction:column;gap:7px;max-height:430px;overflow:auto}
  .crow{display:flex;align-items:center;gap:9px;padding:9px 11px;border:1px solid var(--line);border-radius:11px;
    cursor:pointer;transition:border-color .14s,background .14s;text-align:left;background:var(--card);color:inherit;font:inherit}
  .crow:hover{border-color:var(--brand)} .crow.on{border-color:var(--brand);background:var(--brand-soft)}
  .crow .picons{display:flex;align-items:center;gap:3px;flex:none}
  .crow .picon{width:16px;height:16px;display:block}
  .crow .cn{font-size:13.5px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .crow .cc{font-size:11px;color:var(--faint);flex:none}
  .privcard{padding:18px 20px}
  .privbar{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
  .privh{font-size:15px;font-weight:600}
  .privsub{font-size:12.5px;color:var(--muted);margin-top:4px;max-width:560px;line-height:1.5}
  .privact{display:flex;align-items:center;gap:14px;flex:none}
  .privbtn{display:inline-block;background:var(--grad);color:#fff;font-weight:600;font-size:13px;
    padding:9px 17px;border-radius:9px;cursor:pointer;white-space:nowrap}
  .privbtn:hover{filter:brightness(1.06)} .privbtn input{display:none}
  .privtpl{font-size:12.5px;color:var(--brand-ink);text-decoration:none;border-bottom:1px dashed currentColor;cursor:pointer;white-space:nowrap}
  .privmsg{margin-top:12px;font-size:13px;line-height:1.5}
  .privmsg.ok{color:var(--brand-ink)} .privmsg.bad{color:var(--warn)} .privmsg:empty{display:none}
  .vlist{display:flex;flex-direction:column;gap:8px;max-height:430px;overflow:auto;padding-right:4px}
  .vrow{display:flex;gap:11px;align-items:center;padding:8px;border:1px solid var(--line);border-radius:12px;
    cursor:pointer;transition:border-color .14s,background .14s;background:var(--card);color:inherit;font:inherit;text-align:left;width:100%}
  .vrow:hover{border-color:var(--brand)} .vrow.on{border-color:var(--brand);background:var(--brand-soft)}
  .vrow .vt{width:78px;height:46px;flex:none;border-radius:8px;object-fit:cover;background:var(--thumb-bg)}
  .vrow .vb{flex:1;min-width:0}
  .vrow .vtitle{font-size:13px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .vrow .vmeta{font-size:11.5px;color:var(--muted);margin-top:3px;display:flex;gap:10px}
  .vrow .vmeta b{color:var(--brand-ink);font-weight:700}
  .vhint{color:var(--faint);font-size:13px;padding:30px 6px;text-align:center}

  /* 诊断结果 */
  .diag{margin-top:4px}
  .vhdr{display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap}
  .vhdr .cover{width:240px;aspect-ratio:16/9;border-radius:14px;object-fit:cover;background:var(--thumb-bg);flex:none;box-shadow:var(--shadow)}
  .vhdr .vinfo{flex:1;min-width:230px}
  .vhdr .vttl{font-size:20px;font-weight:700;letter-spacing:-.01em;line-height:1.3}
  .vhdr .vsub{font-size:13px;color:var(--muted);margin-top:6px}
  .vhdr .vsub .tg{color:var(--brand-ink);font-weight:600}
  .stats{display:flex;gap:20px;flex-wrap:wrap;margin-top:14px}
  .stat .sv{font-size:18px;font-weight:800;letter-spacing:-.02em}
  .stat .sl{font-size:11.5px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:4px}
  .stat .sl svg{width:12px;height:12px;opacity:.6}

  .summary{margin-top:20px;padding:15px 18px;border-radius:13px;background:var(--brand-soft);
    border:1px solid var(--line);display:flex;align-items:center;gap:13px}
  .summary .pic{font-size:22px;flex:none}
  .summary .stxt{font-size:14.5px;font-weight:600;line-height:1.5}
  .summary .scount{font-size:12px;color:var(--muted);font-weight:600;margin-top:2px}
  .summary .scount .g{color:var(--ok)} .summary .scount .w{color:var(--warn)}

  .dimt{font-size:13px;font-weight:700;color:var(--muted);margin:26px 0 12px;text-transform:none}
  .dim{border:1px solid var(--line);border-left:4px solid var(--faint);border-radius:13px;padding:16px 18px;margin-bottom:13px;background:var(--card)}
  .dim.good{border-left-color:var(--ok)} .dim.warn{border-left-color:var(--warn)} .dim.ok{border-left-color:var(--faint)} .dim.na{border-left-color:var(--line);opacity:.7}
  .dim-h{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .dim-h .dn{font-size:15.5px;font-weight:700}
  .badge{font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px}
  .badge.good{background:var(--good-soft);color:var(--ok)} .badge.warn{background:var(--warn-soft);color:var(--warn)}
  .badge.ok{background:rgba(140,150,160,.16);color:var(--muted)} .badge.na{background:rgba(140,150,160,.12);color:var(--faint)}
  .dim-head{font-size:13.5px;color:var(--ink);margin-top:7px;line-height:1.6}
  .metrics{margin-top:12px;display:flex;flex-direction:column;gap:9px}
  .metric{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;padding-left:14px;position:relative}
  .metric::before{content:"";position:absolute;left:0;top:7px;width:7px;height:7px;border-radius:50%;background:var(--faint)}
  .metric.good::before{background:var(--ok)} .metric.warn::before{background:var(--warn)}
  .metric .mn{font-size:13px;font-weight:600;min-width:96px}
  .metric .mv{font-size:14px;font-weight:800;letter-spacing:-.01em}
  .metric .mr{font-size:12px;color:var(--faint)}
  .metric .madv{flex-basis:100%;font-size:12.5px;color:var(--warn);padding-left:0;margin-top:1px}
  .advice{margin-top:13px;padding:11px 14px;border-radius:11px;background:var(--warn-soft);
    font-size:13px;line-height:1.6;color:var(--ink);display:flex;gap:9px}
  .advice .ai{flex:none;color:var(--warn);font-weight:800}

  .pending{display:flex;gap:13px;flex-wrap:wrap;margin-top:6px}
  .pcard{flex:1;min-width:200px;border:1px dashed var(--line);border-radius:13px;padding:15px 17px;background:var(--card);opacity:.85}
  .pcard .pn{font-size:14.5px;font-weight:700;display:flex;align-items:center;gap:8px}
  .pcard .ptag{font-size:10.5px;font-weight:700;color:var(--brand-ink);background:var(--brand-soft);padding:2px 8px;border-radius:999px}
  .pcard .pnote{font-size:12.5px;color:var(--muted);margin-top:6px;line-height:1.55}
  .clipbtn{margin-top:15px;border:0;cursor:pointer;font:inherit;font-weight:600;font-size:14px;color:#fff;
    background:var(--grad);padding:11px 21px;border-radius:11px;display:inline-flex;align-items:center;gap:8px;
    box-shadow:0 5px 16px -5px var(--brand);transition:transform .15s ease,box-shadow .15s ease}
  .clipbtn:hover{transform:translateY(-1px);box-shadow:0 8px 20px -6px var(--brand)}
  .clipbtn:disabled{opacity:.6;cursor:default;transform:none;box-shadow:none}
  .cliphint{font-size:12px;color:var(--muted);margin-top:9px;line-height:1.5}
  .clipfail{font-size:13px;color:var(--warn);margin:4px 0 11px;line-height:1.55}
  .opthumb{margin-top:11px;max-width:230px;width:100%;border-radius:10px;border:1px solid var(--line);display:block}
  .opthumb-cap{font-size:11px;color:var(--muted);margin-top:5px}

  /* 教学版 */
  .teach{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
  @media(max-width:680px){.teach{grid-template-columns:1fr}}
  .tcard{border:1px solid var(--line);border-radius:13px;padding:16px 18px;background:var(--card)}
  .tcard .th{font-size:14.5px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:8px}
  .tcard .th .ti{width:24px;height:24px;border-radius:7px;background:var(--brand-soft);color:var(--brand-ink);
    display:inline-flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;flex:none}
  .tcard .tb{font-size:13px;color:var(--muted);line-height:1.65}
  .tcard .tb b{color:var(--ink);font-weight:700}

  .spinner{display:inline-block;width:18px;height:18px;border:2.5px solid var(--line);border-top-color:var(--brand);
    border-radius:50%;animation:spin .7s linear infinite;vertical-align:-4px;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loadbox{padding:40px 6px;text-align:center;color:var(--muted);font-size:14px}
</style>
</head>
<body>
  <nav class="nav"><div class="nav-inner">
    <a class="brand" href="/">
      <svg class="mark" viewBox="0 0 40 40">
        <defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#FB7299"/><stop offset="1" stop-color="#FF3B3B"/></linearGradient></defs>
        <rect width="40" height="40" rx="11" fill="url(#lg)"/>
        <circle cx="20" cy="20" r="9.4" fill="none" stroke="#fff" stroke-width="2.6"/>
        <circle cx="20" cy="20" r="3.4" fill="#fff"/>
        <circle cx="16.3" cy="16.3" r="1.5" fill="#fff" opacity=".85"/>
      </svg>
      <span class="bname">vira<span class="hl">lens</span></span>
      <span class="chip" data-i18n="brandChip">完整报告</span>
    </a>
    <div class="nav-tools">
      <a class="nav-back" href="/" data-i18n="backHome">← 控制台</a>
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" aria-label="theme"></button>
      <button class="lang-btn" onclick="toggleLang()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 0 1 0 20M12 2a15 15 0 0 0 0 20"/></svg>
        <span id="langLabel">EN</span>
      </button>
    </div>
  </div></nav>

  <header class="hero"><div class="hero-inner">
    <h1 data-i18n="heroTitle">完整<span class="hl">报告</span></h1>
    <div class="desc" data-i18n="heroDesc"></div>
  </div></header>

  <div class="wrap">

    <!-- 选择器 -->
    <div class="card">
      <div class="card-head"><span class="sec-badge">1</span>
        <h2 data-i18n="pickTitle">选一条视频</h2>
        <span class="sec-sub" data-i18n="pickSub">先选创作者,再挑一条视频开始诊断</span>
      </div>
      <div class="pick">
        <div>
          <div class="pcol-h" data-i18n="pickCreator">创作者</div>
          <div class="clist" id="clist"><div class="vhint" data-i18n="loadingList">加载中…</div></div>
        </div>
        <div>
          <div class="pcol-h" data-i18n="pickVideo">视频(按播放排序)</div>
          <div class="vlist" id="vlist"><div class="vhint" data-i18n="pickHint">← 先选左边的创作者</div></div>
        </div>
      </div>
    </div>

    <!-- 导入自己的后台数据(CSV) -->
    <div class="card privcard" id="privCard" style="display:none">
      <div class="privbar">
        <div class="privtxt">
          <div class="privh">📊 <span data-i18n="privTitle">导入我的后台数据</span></div>
          <div class="privsub" id="privSub"></div>
        </div>
        <div class="privact">
          <label class="privbtn"><span data-i18n="privPick">选择 CSV</span>
            <input type="file" id="privFile" accept=".csv,text/csv" onchange="handlePrivFile(this)"></label>
          <a class="privtpl" id="privTpl" href="#" onclick="downloadTemplate(event)" data-i18n="privTpl">下载模板</a>
        </div>
      </div>
      <div class="privmsg" id="privMsg"></div>
    </div>

    <!-- 诊断结果 -->
    <div class="card" id="diagCard" style="display:none">
      <div class="card-head"><span class="sec-badge">2</span>
        <h2 data-i18n="diagTitle">逐项诊断</h2>
        <span class="sec-sub" data-i18n="diagSub">对照这个创作者自己的爆款</span>
      </div>
      <div id="diag"><div class="loadbox" data-i18n="diagEmpty">选一条视频开始诊断 ↑</div></div>
    </div>

    <!-- 教学版通用结论 -->
    <div class="card">
      <div class="card-head"><span class="sec-badge">3</span>
        <h2 data-i18n="teachTitle">教学版:常见规律</h2>
        <span class="sec-sub" data-i18n="teachSub">主要来自知识 + 娱乐区样本;不同分区效果不同 —— 按你的赛道挑着用</span>
      </div>
      <div class="teach" id="teach"></div>
    </div>

  </div>

<script>
/* ===== i18n ===== */
const I18N = {
  zh:{
    brandChip:"完整报告", langBtn:"EN", backHome:"← 控制台",
    heroTitle:'完整<span class="hl">报告</span>',
    heroDesc:"选一位创作者、挑一条视频,逐项拆解封面 / 标题 / 互动 / 时长 —— 告诉你这条做对了什么、还能怎么改。不是泛泛而谈,每条都跟这个创作者自己的爆款比。",
    pickTitle:"选一条视频", pickSub:"先选创作者,再挑一条视频开始诊断",
    pickCreator:"创作者", pickVideo:"视频(按播放排序)", pickHint:"← 先选左边的创作者",
    loadingList:"加载中…",
    diagTitle:"逐项诊断", diagSub:"对照这个创作者自己的爆款", diagEmpty:"选一条视频开始诊断 ↑",
    diagLoading:"诊断中…",
    teachTitle:"教学版:常见规律", teachSub:"主要来自知识 + 娱乐区样本;不同分区效果不同 —— 按你的赛道挑着用",

function kfmt(n){ if(n==null||n==='')return'—'; n=Number(n); if(isNaN(n))return'—';
  if(lang==='zh'){ if(n>=1e8)return trim1(n/1e8)+'亿'; if(n>=1e4)return trim1(n/1e4)+'万'; return n.toLocaleString(); }

function showPrivCard(alias){
  const card=document.getElementById('privCard'); if(!card) return;
  card.style.display='block';
  document.getElementById('privMsg').textContent='';
  const sub=document.getElementById('privSub'); sub.textContent=L().privEmpty;
  fetch('/api/private/status?alias='+encodeURIComponent(alias)).then(r=>r.json()).then(d=>{
    if(d && d.n>0) sub.textContent = (lang==='zh'?`已导入 ${d.n} 条 · 重新选文件可覆盖更新`:`${d.n} videos imported · pick a file again to update`);
  }).catch(()=>{});
}
function handlePrivFile(input){
  const f=input.files && input.files[0]; if(!f||!CUR.alias) return;
  const msg=document.getElementById('privMsg'); msg.className='privmsg'; msg.textContent=L().privReading;
  const reader=new FileReader();
  reader.onload=()=>{
    msg.textContent=L().privUploading;
    fetch('/api/private/upload',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({alias:CUR.alias, csv:String(reader.result||'')})})
      .then(r=>r.json()).then(d=>{
        if(!d.ok){ msg.className='privmsg bad'; msg.textContent='✕ '+(d.error||'导入失败'); return; }
        showPrivCard(CUR.alias);                        // 先刷状态(会清空 msg)
        if(CUR.vid) selectVideo(CUR.alias, CUR.vid);    // 重新诊断,私有维度就出来了
        const un = d.n_unmatched? (lang==='zh'?`,${d.n_unmatched} 条没对上(标题/ID 不匹配,跳过)`:`, ${d.n_unmatched} unmatched (title/ID mismatch, skipped)`):'';
        msg.className='privmsg ok';                     // 再写结果,盖过上面的清空,让用户看得到
        msg.textContent = (lang==='zh'?`✓ 导入 ${d.n_matched}/${d.n_rows} 条${un}`:`✓ Imported ${d.n_matched}/${d.n_rows}${un}`);
      }).catch(()=>{ msg.className='privmsg bad'; msg.textContent='✕ '+(lang==='zh'?'请求失败':'request failed'); });
  };
  reader.readAsText(f); input.value='';
}

/* ===== 视频下载层:开头镜头 + 配乐 (B 期) ===== */
function renderClipZone(){
  const z=document.getElementById('clipZone'); if(!z) return;
  if(CUR.clipLoading){
    z.innerHTML = `<div class="dimt">${L().pendT}</div><div class="loadbox"><span class="spinner"></span>${L().clipLoading}</div>`;
    return;
  }
  const c=CUR.clip;
  if(c && c.ok){
    z.innerHTML = `<div class="dimt">${L().clipDone}</div>` + (c.dims||[]).map(dimCard).join('');
    return;
  }
  if(c && !c.ok){
    const hint = c.hint?`<div class="cliphint">${esc(TT(c.hint))}</div>`:'';
    z.innerHTML = `<div class="dimt">${L().pendT}</div>`+
      `<div class="clipfail">${L().clipErr}:${esc(c.error||'')}</div>${hint}`+
      `<button class="clipbtn" onclick="runClip()">${L().clipRetry}</button>`;
    return;
  }
  const d=CUR.data||{};
  const cards=(d.pending||[]).map(p=>`<div class="pcard"><div class="pn">${esc(TT(p.label))}</div></div>`).join('');
  z.innerHTML = `<div class="dimt">${L().pendT}</div><div class="pending">${cards}</div>`+
    `<button class="clipbtn" onclick="runClip()">${esc(L().clipBtn)}</button>`+
    `<div class="cliphint">${L().clipHint}</div>`;
}
function runClip(){
  if(!CUR.alias||!CUR.vid) return;
  CUR.clipLoading=true; CUR.clip=null; renderClipZone();
  fetch(`/api/diag/clip?alias=${encodeURIComponent(CUR.alias)}&vid=${encodeURIComponent(CUR.vid)}`)
    .then(r=>r.json())
    .then(res=>{ CUR.clipLoading=false; CUR.clip=res; renderClipZone(); })
    .catch(()=>{ CUR.clipLoading=false; CUR.clip={ok:false,error:'请求失败'}; renderClipZone(); });
}

   b:{zh:"用<b>第二人称</b>把标题/开头变成对观众说话('你有没有想过…'),在我们样本里和更高的评论参与相关。把'介绍一个现象'改成'你正在被这个现象骗'。",
      en:"Framing the title/opening as <b>second person</b> ('have you ever…') correlates with higher comment engagement in our sample. Turn 'here's a phenomenon' into 'you're being fooled by this'."}},
  {n:"3", h:{zh:"封面三件套",en:"The cover trifecta"},
   b:{zh:"爆款封面普遍<b>饱和度、对比度、色彩丰富度</b>都更高——颜色更跳、主体更分明。别让封面发灰发暗(亮度太低在小图里会糊成一团)。诊断里会直接拿你自己的爆款均值当尺子。",
      en:"Hit thumbnails tend to score higher on <b>saturation, contrast, colorfulness</b>—punchier color, clearer subject. Don't let covers go gray or dark (low brightness turns to mush at thumbnail size). The diagnosis measures you against your own hits."}},
  {n:"4", h:{zh:"前 3 秒定生死",en:"The first 3 seconds"},
   b:{zh:"开头平铺直叙最劝退。前几句先抛一个<b>冲突 / 悬念 / 承诺</b>('看完这条,你再也不会…'),把最大爽点往前提,别留到中段。<br><span style='opacity:.7'>(音乐 / 美食 / Vlog 类:钩子可以是画面或氛围,不一定是一句话。)</span>",
      en:"A flat opening is the biggest drop-off. Open with a <b>conflict / mystery / promise</b> and front-load the payoff—don't bury it mid-video.<br><span style='opacity:.7'>(Music / food / vlog: the hook can be a visual or a mood, not necessarily a line.)</span>"}},
  {n:"5", h:{zh:"时长跟着分区走",en:"Match your zone's length"},
   b:{zh:"没有'越长越好'。每个内容分区有自己的<b>舒适时长</b>,明显超出的视频完播率容易被拖累。诊断会拿同分区中位时长跟你这条比。",
      en:"Longer isn't better. Each niche has a <b>comfortable length</b>; running well over it tends to hurt completion. The diagnosis compares your video to the zone's median length."}},
  {n:"6", h:{zh:"评论比点赞更说明问题",en:"Comments tell you more than likes"},
   b:{zh:"<b>评论率</b>反映'有没有留下可讨论的话题'。比同分区低,通常是内容没给观众开口的理由——结尾抛个开放问题或一个温和的争议点。",
      en:"<b>Comment rate</b> reflects whether you left something worth discussing. Below your zone usually means no reason to speak up—end with an open question or a mild hot take."}},
];
function renderTeach(){
  document.getElementById('teach').innerHTML = TEACH.map(t=>`
    <div class="tcard"><div class="th"><span class="ti">${t.n}</span>${TT(t.h)}</div>
    <div class="tb">${TT(t.b)}</div></div>`).join('');
}

/* ===== boot ===== */
updateThemeBtn(); applyLang(); renderTeach(); loadList();
</script>
