<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>viralens · 控制台</title>
<script>/* 防闪烁:首帧前定好昼夜(默认按本地时间 7-19 = 浅色) */
(function(){var t=localStorage.getItem('theme');if(t!=='light'&&t!=='dark'){var h=new Date().getHours();t=(h>=7&&h<19)?'light':'dark';}document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --brand:#FD4E63; --brand-ink:#D5344E; --brand2:#FF3B3B;
    --grad:linear-gradient(135deg,#FB7299 0%,#FF3B3B 100%);
    --brand-soft:rgba(253,78,99,.12);
    --bili:#FB7299; --yt:#FF0000; --ok:#1F9D55;
    --ink:#15181C; --muted:#6A7480; --faint:#9AA4AD;
    --line:#EAEDF0; --card:#FFFFFF; --bg:#F6F7F9;
    --nav-bg:rgba(255,255,255,.82);
    --input-bg:#FFFFFF; --code-bg:#F0F2F4;
    --thumb-bg:linear-gradient(135deg,#E6EAEE,#CFD6DD);
    --radius:18px;
    --shadow:0 1px 2px rgba(15,20,25,.04),0 18px 40px -30px rgba(15,20,25,.28);
    --shadow-hover:0 6px 14px rgba(15,20,25,.07),0 26px 50px -28px rgba(15,20,25,.35);
    --hero-glow:rgba(253,78,99,.28);
    --hero-bg:linear-gradient(180deg,#FFF0F4 0%,#F6F7F9 86%);
  }
  html[data-theme="dark"]{
    --brand:#FF6E83; --brand-ink:#FF6E83; --brand2:#FF5A5A;
    --grad:linear-gradient(135deg,#FF8FB0 0%,#FF5A5A 100%);
    --brand-soft:rgba(255,110,131,.16);
    --bili:#FF8FB0; --yt:#FF4D4D; --ok:#37C871;
    --ink:#EDF0F3; --muted:#9BA7B3; --faint:#6C7783;
    --line:#262C34; --card:#181C22; --bg:#0F1216;
    --nav-bg:rgba(18,22,26,.80);
    --input-bg:#1E232B; --code-bg:#222831;
    --thumb-bg:linear-gradient(135deg,#222831,#181C22);
    --shadow:0 1px 2px rgba(0,0,0,.35),0 18px 40px -30px rgba(0,0,0,.7);
    --shadow-hover:0 6px 14px rgba(0,0,0,.4),0 26px 50px -28px rgba(0,0,0,.82);
    --hero-glow:rgba(255,90,110,.20);
    --hero-bg:linear-gradient(180deg,#1A1320 0%,#0F1216 90%);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:"Roboto","Noto Sans SC","PingFang SC","Microsoft YaHei",system-ui,-apple-system,sans-serif;
    color:var(--ink);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility}
  a{color:inherit;text-decoration:none}

  /* 昼夜切换的平滑过渡(临时挂在 <html> 上) */
  html.theme-transition,html.theme-transition *{
    transition:background-color .5s ease,color .5s ease,border-color .5s ease,
      fill .5s ease,stroke .5s ease,box-shadow .5s ease !important}
  /* 语言切换的淡入淡出 */
  .hero,.wrap{transition:opacity .2s ease}
  body.lswitch .hero,body.lswitch .wrap{opacity:.25}

  /* ——— nav ——— */
  .nav{position:sticky;top:0;z-index:40;background:var(--nav-bg);
    backdrop-filter:saturate(180%) blur(14px);-webkit-backdrop-filter:saturate(180%) blur(14px);
    border-bottom:1px solid var(--line)}
  .nav-inner{max-width:1080px;margin:0 auto;height:60px;padding:0 22px;
    display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:11px}
  .brand .mark{width:30px;height:30px;flex:none;border-radius:9px;
    box-shadow:0 4px 12px -4px var(--brand)}
  .brand .bname{font-weight:900;font-size:19px;letter-spacing:-.02em}
  .brand .bname .hl{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .brand .chip{font-size:12px;background:var(--brand-soft);
    color:var(--brand-ink);font-weight:600;padding:2px 9px;border-radius:999px;margin-left:2px}
  .nav-tools{display:flex;align-items:center;gap:9px}
  .icon-btn{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;
    color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:999px;
    cursor:pointer;transition:border-color .15s,background .15s,transform .12s}
  .icon-btn:hover{border-color:var(--brand)} .icon-btn:active{transform:scale(.94)}
  .icon-btn svg{width:17px;height:17px}
  .lang-btn{display:inline-flex;align-items:center;gap:6px;font:inherit;font-size:13px;font-weight:700;
    color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:999px;
    padding:0 15px;height:38px;cursor:pointer;transition:border-color .15s,background .15s}
  .lang-btn:hover{border-color:var(--brand)}
  .lang-btn svg{width:14px;height:14px;opacity:.7}

  /* ——— hero ——— */
  .hero{background:radial-gradient(620px 280px at 84% -30%,var(--hero-glow),transparent 72%),var(--hero-bg);
    border-bottom:1px solid var(--line)}
  .hero-inner{max-width:1080px;margin:0 auto;padding:60px 22px 50px}
  .hero h1{font-size:52px;font-weight:900;letter-spacing:-.04em;line-height:1}
  .hero h1 .hl{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero .meaning{margin-top:16px;font-size:17px;font-weight:600;color:var(--brand-ink)}
  .hero .desc{margin-top:8px;font-size:15.5px;color:var(--muted);max-width:680px;line-height:1.7}
  .hero .privacy{display:inline-flex;align-items:center;gap:7px;margin-top:18px;font-size:12.5px;
    font-weight:600;color:var(--ok);background:rgba(31,157,85,.12);padding:5px 13px;border-radius:999px}
  .hero .privacy svg{width:13px;height:13px}

  /* ——— layout ——— */
  .wrap{max-width:1080px;margin:0 auto;padding:30px 22px 90px}

  /* ——— card ——— */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:26px 30px;margin-bottom:20px;box-shadow:var(--shadow)}
  .card-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .sec-badge{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;
    border-radius:9px;background:var(--brand-soft);color:var(--brand-ink);font-weight:900;font-size:15px;flex:none}
  .card-head h2{font-size:19px;font-weight:700;letter-spacing:-.01em}
  .sec-sub{font-size:13px;color:var(--muted);font-weight:500}
  .head-actions{margin-left:auto;display:flex;gap:10px;flex-wrap:wrap}
  .desc{color:var(--muted);font-size:13.5px;margin:8px 0 4px;line-height:1.7}
  code{background:var(--code-bg);border-radius:5px;padding:1px 6px;font-size:12.5px;
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}

  /* ——— pills (status) ——— */
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;
    border-radius:999px;padding:4px 11px;margin-left:8px}
  .pill.on{background:rgba(31,157,85,.13);color:var(--ok)}
  .pill.off{background:rgba(140,150,160,.16);color:var(--muted)}

  /* ——— platform chips ——— */
  .field-label{font-size:13px;font-weight:700;color:var(--ink);margin:18px 0 9px}
  .chips{display:flex;gap:10px;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;gap:9px;font-size:14px;font-weight:600;color:var(--ink);
    border:1.5px solid var(--line);border-radius:12px;padding:9px 16px;cursor:pointer;
    user-select:none;transition:border-color .15s,background .15s,box-shadow .15s,opacity .15s}
  .chip input{display:none}
  .chip .dot{width:9px;height:9px;border-radius:50%;background:var(--faint);transition:background .15s}
  .chip.bili .dot{background:var(--bili)} .chip.yt .dot{background:var(--yt)}
  .chip:has(input:checked){border-color:var(--brand);background:var(--brand-soft);
    box-shadow:0 0 0 3px var(--brand-soft)}
  .chip:not(:has(input:checked)){opacity:.5}
  .chip:not(:has(input:checked)) .dot{background:var(--faint)!important}

  /* ——— inputs ——— */
  .key-row{margin-top:14px}
  .key-row.hide{display:none}
  label.fld{display:block;font-size:12.5px;color:var(--muted);font-weight:600;margin-bottom:6px}
  input[type=text],input[type=password]{width:100%;font:inherit;font-size:14px;color:var(--ink);
    background:var(--input-bg);border:1.5px solid var(--line);border-radius:12px;padding:11px 14px;outline:none;
    transition:border-color .15s,box-shadow .15s}
  input::placeholder{color:var(--faint)}
  input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}

  details{margin-top:16px;border-top:1px dashed var(--line);padding-top:13px}
  summary{cursor:pointer;font-size:13px;color:var(--brand-ink);font-weight:700;list-style:none}
  summary::-webkit-details-marker{display:none}
  summary::before{content:"▸ ";font-size:11px}
  details[open] summary::before{content:"▾ "}
  .guide{margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:640px){.guide{grid-template-columns:1fr}}
  .guide-h{font-size:13.5px;font-weight:700;color:var(--ink);margin-bottom:8px}
  .guide ol{margin:0 0 0 4px;padding:0;list-style:none;counter-reset:s}
  .guide li{position:relative;padding:0 0 9px 30px;font-size:13px;color:var(--muted);line-height:1.55;counter-increment:s}
  .guide li::before{content:counter(s);position:absolute;left:0;top:0;width:20px;height:20px;
    display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;
    color:var(--brand-ink);background:var(--brand-soft);border-radius:50%}
  .guide li b{color:var(--ink);font-weight:700}

  /* ——— buttons ——— */
  .btns{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-top:18px}
  .btn{font:inherit;font-weight:700;font-size:14px;border:none;border-radius:12px;cursor:pointer;
    padding:11px 22px;transition:transform .12s,box-shadow .15s,filter .15s,opacity .15s,border-color .15s}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .btn-primary{background:var(--grad);color:#fff;box-shadow:0 8px 20px -10px var(--brand)}
  .btn-primary:hover:not(:disabled){filter:brightness(1.05)}
  .btn-invert{background:var(--ink);color:var(--bg)}
  .btn-invert:hover:not(:disabled){opacity:.88}
  .btn-ghost{background:var(--card);color:var(--brand-ink);border:1.5px solid var(--line)}
  .btn-ghost:hover:not(:disabled){border-color:var(--brand)}
  .opts{display:flex;gap:20px;flex-wrap:wrap;margin-top:16px;font-size:13.5px;color:var(--muted)}
  .opts label{display:inline-flex;align-items:center;gap:8px;cursor:pointer}
  .opts input{width:16px;height:16px;accent-color:var(--brand)}

  /* ——— creators table ——— */
  .scroll{max-height:330px;overflow:auto;border:1px solid var(--line);border-radius:13px;margin-top:14px}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{text-align:left;padding:10px 14px;border-bottom:1px solid var(--line)}
  thead th{position:sticky;top:0;background:var(--card);color:var(--muted);font-weight:700;font-size:12px;
    text-transform:uppercase;letter-spacing:.04em}
  tbody tr:last-child td{border-bottom:none}
  .ptag{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700}
  .ptag .dot{width:8px;height:8px;border-radius:50%}
  .ptag.bili{color:var(--bili)} .ptag.bili .dot{background:var(--bili)}
  .ptag.yt{color:var(--yt)} .ptag.yt .dot{background:var(--yt)}
  .zone-tag{font-size:12.5px;color:var(--muted);font-weight:600}

  /* ——— KPI band(结果摘要,有数据才显示) ——— */
  .kpis{display:none;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:16px}
  @media(max-width:640px){.kpis{grid-template-columns:repeat(2,1fr)}}
  .kpi{position:relative;overflow:hidden;background:var(--bg);border:1px solid var(--line);
    border-radius:13px;padding:13px 16px 12px;animation:kin .45s cubic-bezier(.2,.7,.3,1) both}
  .kpi:nth-child(2){animation-delay:.06s}.kpi:nth-child(3){animation-delay:.12s}.kpi:nth-child(4){animation-delay:.18s}
  @keyframes kin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .kpi .k-num{font-size:24px;font-weight:900;letter-spacing:-.03em;font-variant-numeric:tabular-nums;line-height:1.15}
  .kpi .k-lab{font-size:11.5px;font-weight:700;color:var(--muted);letter-spacing:.05em;margin-top:2px}
  .kpi::after{content:"";position:absolute;inset:auto 0 0 0;height:2px;background:var(--grad);opacity:.55}

  /* ——— creators 表的「数据」列 ——— */
  .dcell{font-variant-numeric:tabular-nums;font-weight:600;font-size:12.5px;color:var(--ink);white-space:nowrap}
  .dcell .ddate{color:var(--faint);font-weight:500}

  /* ——— toolbar ——— */
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0 6px;align-items:center}
  .search{position:relative;flex:1;min-width:210px}
  .search svg{position:absolute;left:15px;top:50%;transform:translateY(-50%);width:16px;height:16px;
    color:var(--faint);pointer-events:none}
  .search input{width:100%;padding-left:42px;border-radius:999px}
  .sel{font:inherit;font-size:13.5px;color:var(--ink);background:var(--input-bg);border:1.5px solid var(--line);
    border-radius:999px;padding:10px 16px;outline:none;cursor:pointer}
  .sel:focus{border-color:var(--brand)}

  /* ——— video grid ——— */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(228px,1fr));gap:18px;margin-top:14px}
  .vcard{display:flex;flex-direction:column;background:var(--card);border:1px solid var(--line);
    border-radius:14px;overflow:hidden;transition:transform .16s,box-shadow .16s,border-color .16s}
  .vcard:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover);border-color:transparent}
  .thumb{position:relative;aspect-ratio:16/9;background:var(--thumb-bg)}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .thumb img.broken{display:none}
  .thumb-badge{position:absolute;top:8px;left:8px;font-size:11px;font-weight:900;color:#fff;
    padding:2px 8px;border-radius:7px;letter-spacing:.02em}
  .thumb-badge.bili{background:var(--bili)} .thumb-badge.yt{background:var(--yt)}
  .thumb-dur{position:absolute;bottom:8px;right:8px;font-size:11px;font-weight:700;color:#fff;
    background:rgba(0,0,0,.78);padding:1px 7px;border-radius:6px;font-variant-numeric:tabular-nums}
  .vmeta{padding:12px 13px 14px;display:flex;flex-direction:column;gap:6px}
  .vtitle{font-size:14px;font-weight:700;line-height:1.4;letter-spacing:-.01em;color:var(--ink);
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:39px}
  .vsub{font-size:12px;color:var(--muted);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .vstats{display:flex;gap:13px;margin-top:2px;font-size:12px;color:var(--muted);font-weight:600;
    font-variant-numeric:tabular-nums}
  .vstats span{display:inline-flex;align-items:center;gap:4px}
  .vstats svg{width:13px;height:13px;opacity:.65}
  .empty{grid-column:1/-1;text-align:center;color:var(--faint);padding:38px 0;font-size:14px}
  .more-wrap{text-align:center;margin-top:22px}
  #vmore{display:none}

  /* ——— log ——— */
  #log{display:none;background:#0E1620;color:#C9D6DE;border-radius:13px;padding:15px 17px;margin-top:18px;
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12.5px;line-height:1.6;
    white-space:pre-wrap;max-height:300px;overflow:auto}
  .spin{display:inline-block;width:13px;height:13px;border:2px solid var(--brand-soft);
    border-top-color:var(--brand);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:7px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .runstate{font-size:13px;color:var(--muted);font-weight:600}

  /* ——— toast ——— */
  #toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--bg);font-size:13.5px;font-weight:600;padding:12px 22px;border-radius:13px;
    box-shadow:0 16px 44px -16px rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:.25s;z-index:60;max-width:80vw}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .foot{text-align:center;color:var(--faint);font-size:12.5px;margin-top:8px}
  .foot a{color:var(--brand-ink);font-weight:600}
  .foot a:hover{text-decoration:underline}

  @media (max-width:560px){
    .hero h1{font-size:38px} .hero-inner{padding:46px 22px 40px}
    .card{padding:22px 18px} .head-actions{width:100%;margin-left:0}
  }
</style>
</head>
<body>
  <nav class="nav"><div class="nav-inner">
    <a class="brand" href="/">
      <svg class="mark" viewBox="0 0 40 40">
        <defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#FB7299"/><stop offset="1" stop-color="#FF3B3B"/></linearGradient></defs>
        <rect width="40" height="40" rx="11" fill="url(#lg)"/>
        <circle cx="20" cy="20" r="9.4" fill="none" stroke="#fff" stroke-width="2.6"/>
        <circle cx="20" cy="20" r="3.4" fill="#fff"/>
        <circle cx="16.3" cy="16.3" r="1.5" fill="#fff" opacity=".85"/>
      </svg>
      <span class="bname">vira<span class="hl">lens</span></span>
      <span class="chip" data-i18n="brandChip">短视频数据透镜</span>
    </a>
    <div class="nav-tools">
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" aria-label="theme"></button>
      <button class="lang-btn" onclick="toggleLang()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 0 1 0 20M12 2a15 15 0 0 0 0 20"/></svg>
        <span id="langLabel">EN</span>
      </button>
    </div>
  </div></nav>

  <header class="hero"><div class="hero-inner">
    <h1>vira<span class="hl">lens</span></h1>
    <div class="meaning" data-i18n="heroMeaning"></div>
    <div class="desc" data-i18n="heroDesc"></div>
    <div class="privacy">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
      <span data-i18n="heroPrivacy"></span>
    </div>
  </div></header>

  <div class="wrap">

    <!-- ① keys -->
    <div class="card">
      <div class="card-head"><span class="sec-badge">1</span><h2 data-i18n="keysTitle"></h2><span id="kpills"></span></div>
      <div class="desc" data-i18n="keysDesc"></div>

      <div class="field-label" data-i18n="whichPlatforms"></div>
      <div class="chips">
        <label class="chip bili"><input type="checkbox" id="useBili" checked onchange="onPlatformToggle()"><span class="dot"></span>Bilibili</label>
        <label class="chip yt"><input type="checkbox" id="useYt" checked onchange="onPlatformToggle()"><span class="dot"></span>YouTube</label>
      </div>

      <div class="key-row" id="row-bili">
        <label class="fld" data-i18n="sessLabel"></label>
        <input id="sessdata" type="password" autocomplete="off" data-i18n-ph="sessPh">
      </div>
      <div class="key-row" id="row-yt">
        <label class="fld" data-i18n="ytLabel"></label>
        <input id="ytkey" type="password" autocomplete="off" data-i18n-ph="ytPh">
      </div>

      <div class="btns">
        <button class="btn btn-primary" onclick="saveKeys()" data-i18n="saveKeys"></button>
      </div>
      <details>
        <summary data-i18n="howGet"></summary>
        <div class="guide">
          <div>
            <div class="guide-h" data-i18n="howBiliH"></div>
            <ol data-i18n="howBiliSteps"></ol>
          </div>
          <div>
            <div class="guide-h" data-i18n="howYtH"></div>
            <ol data-i18n="howYtSteps"></ol>
          </div>
        </div>
      </details>
    </div>

    <!-- ② creators -->
    <div class="card">
      <div class="card-head"><span class="sec-badge">2</span><h2 data-i18n="creatorsTitle"></h2><span id="ccount" class="sec-sub"></span></div>
      <div class="desc" data-i18n="creatorsDesc"></div>
      <div class="scroll"><table id="ctable">
        <thead><tr><th data-i18n="thName"></th><th data-i18n="thPlat"></th><th data-i18n="thZone"></th><th data-i18n="thData"></th></tr></thead>
        <tbody></tbody></table></div>
    </div>

    <!-- ③ fetch -->
    <div class="card">

/* 分区名:中英双语(原始值来自 creators.py 的 zone 字段) */

function zoneLabel(z){ const m=ZONE_I18N[z]; return m?m[lang]:(z||''); }

let lang = localStorage.getItem('lang') || 'zh';
function L(){ return I18N[lang]; }
function applyLang(){
  document.documentElement.lang = lang==='zh' ? 'zh-CN' : 'en';
  document.getElementById('langLabel').textContent = L().langBtn;
  document.querySelectorAll('[data-i18n]').forEach(el=>{ const v=L()[el.dataset.i18n]; if(typeof v==='string') el.innerHTML=v; });
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{ const v=L()[el.dataset.i18nPh]; if(typeof v==='string') el.placeholder=v; });
}
function toggleLang(){
  lang = lang==='zh'?'en':'zh'; localStorage.setItem('lang',lang);
  document.body.classList.add('lswitch');
  setTimeout(()=>{ applyLang(); renderStatus(); renderKpis(); renderGrid();
    document.body.classList.remove('lswitch'); }, 200);
}

/* ——————————————————— theme (昼夜) ——————————————————— */
const ICON_MOON='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
const ICON_SUN ='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
function curTheme(){ return document.documentElement.getAttribute('data-theme')||'light'; }
function updateThemeBtn(){ document.getElementById('themeBtn').innerHTML = curTheme()==='dark' ? ICON_SUN : ICON_MOON; }
function toggleTheme(){
  const next = curTheme()==='dark' ? 'light' : 'dark';
  const root = document.documentElement;
  root.classList.add('theme-transition'); void root.offsetWidth;
  root.setAttribute('data-theme', next); localStorage.setItem('theme', next);
  updateThemeBtn();
  setTimeout(()=>root.classList.remove('theme-transition'), 550);
}

/* ——————————————————— helpers ——————————————————— */
let STATE = { status:null, videos:[], total:0 };
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2800); }
const esc = s => (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function trim1(x){ return (Math.round(x*10)/10).toString(); }
function kfmt(n){
  if(n===null||n===undefined||n==='') return '-'; n=Number(n); if(isNaN(n)) return '-';
  if(lang==='zh'){ if(n>=1e8) return trim1(n/1e8)+'亿'; if(n>=1e4) return trim1(n/1e4)+'万'; return n.toLocaleString(); }
  if(n>=1e9) return trim1(n/1e9)+'B'; if(n>=1e6) return trim1(n/1e6)+'M'; if(n>=1e3) return trim1(n/1e3)+'K'; return String(n);
}
function hhmmss(s){ s=parseInt(s||0,10); if(!s) return ''; const h=Math.floor(s/3600),m=Math.floor(s%3600/60),x=s%60;
  const p=n=>String(n).padStart(2,'0'); return h?`${h}:${p(m)}:${p(x)}`:`${m}:${p(x)}`; }
const IC = {
  play:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>',
  like:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 21h2V9H2v12zm20-11a2 2 0 0 0-2-2h-6.31l.95-4.57.03-.32a1.5 1.5 0 0 0-.44-1.06L13.17 1 6.59 7.59A2 2 0 0 0 6 9v10a2 2 0 0 0 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>',
  cmt:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4a2 2 0 0 0-2 2v18l4-4h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/></svg>',
  danmaku:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 5h14v2H2zM6 9.5h16v2H6zM2 14h11v2H2zM9 18.5h13v2H9z"/></svg>'
};

/* ——————————————————— platforms ——————————————————— */
function restorePlatforms(){
  const sv = localStorage.getItem('platforms');
  if(sv){ try{ const o=JSON.parse(sv);
    document.getElementById('useBili').checked = !!o.bili;
    document.getElementById('useYt').checked = !!o.yt;
  }catch(e){} }
  syncPlatformRows();
}
function syncPlatformRows(){
  const b=document.getElementById('useBili').checked, y=document.getElementById('useYt').checked;
  document.getElementById('row-bili').classList.toggle('hide',!b);
  document.getElementById('row-yt').classList.toggle('hide',!y);
}
function onPlatformToggle(){
  const b=document.getElementById('useBili'), y=document.getElementById('useYt');
  if(!b.checked && !y.checked){ toast(L().tPickOne); b.checked = true; }
  localStorage.setItem('platforms', JSON.stringify({bili:b.checked, yt:y.checked}));
  syncPlatformRows();
}
function selectedPlatforms(){
  const a=[]; if(document.getElementById('useBili').checked) a.push('bilibili');
  if(document.getElementById('useYt').checked) a.push('youtube'); return a;
}

/* ——————————————————— status / creators ——————————————————— */
async function refreshStatus(){ STATE.status = await (await fetch('/api/status')).json(); renderStatus(); }
function renderStatus(){
  const s = STATE.status; if(!s) return;
  document.getElementById('kpills').innerHTML =
    `<span class="pill ${s.bilibili_key?'on':'off'}">B站 ${s.bilibili_key?L().set:L().notset}</span>`+
    `<span class="pill ${s.youtube_key?'on':'off'}">YouTube ${s.youtube_key?L().set:L().notset}</span>`;
  const tb=document.querySelector('#ctable tbody');
  tb.innerHTML = (s.creators||[]).map(c=>{
    const yt=c.platform==='youtube';
    const data = c.count ? `<span class="dcell">${L().cData(c.count, esc(c.updated||''))}</span>`
                         : `<span class="pill off" style="margin-left:0">${L().notFetched}</span>`;
    return `<tr><td>${esc(c.name)}</td><td><span class="ptag ${yt?'yt':'bili'}"><span class="dot"></span>${yt?'YouTube':'Bilibili'}</span></td><td><span class="zone-tag">${esc(zoneLabel(c.zone))}</span></td><td>${data}</td></tr>`;
  }).join('');
  document.getElementById('ccount').textContent = L().cTotal((s.creators||[]).length);
}

/* ——————————————————— keys ——————————————————— */
async function saveKeys(){
  const sessdata=document.getElementById('sessdata').value, youtube_api_key=document.getElementById('ytkey').value;
  if(!sessdata && !youtube_api_key){ toast(L().tBothEmpty); return; }
  await fetch('/api/keys',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({sessdata,youtube_api_key})});
  document.getElementById('sessdata').value=''; document.getElementById('ytkey').value='';
  await refreshStatus(); toast(L().tSaved);
}

/* ——————————————————— run ——————————————————— */
let polling=null;
function setRunning(on){
  document.getElementById('btn-data').disabled=on; document.getElementById('btn-report').disabled=on;
  document.getElementById('runstate').innerHTML = on?`<span class="spin"></span>${L().running}`:'';
}
async function run(mode){
  const no_fetch=document.getElementById('nofetch').checked, force=document.getElementById('force').checked;
  const platforms=selectedPlatforms();
  const log=document.getElementById('log'); log.style.display='block'; log.textContent='…';
  const r=await fetch('/api/run',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({mode,no_fetch,force,platforms})});
  if(r.status===409){ toast(L().tRunningWait); return; }
  setRunning(true); if(polling) clearInterval(polling); polling=setInterval(poll,900);
}
async function poll(){
  const p=await (await fetch('/api/progress')).json();
  const log=document.getElementById('log'); log.textContent=p.lines.join('\n'); log.scrollTop=log.scrollHeight;
  if(!p.running){ clearInterval(polling); polling=null; setRunning(false);
    await refreshStatus(); await loadData();
    toast(p.returncode===0 ? (p.mode==='report'?L().tDoneReport:L().tDoneData) : L().tErr); }
}

/* ——————————————————— results grid (分页) ——————————————————— */
const PAGE=24; let pageN=1;
function resetPage(){ pageN=1; }
function moreGrid(){ pageN++; renderGrid(); }
async function loadData(){ const d=await (await fetch('/api/data')).json();
  STATE.videos=d.videos||[]; STATE.total=d.count||0; STATE.stats=d.stats||null;
  resetPage(); renderKpis(); renderGrid(); }
function renderKpis(){
  const el=document.getElementById('kpis'), s=STATE.stats; if(!el) return;
  if(!s || !s.videos){ el.style.display='none'; el.innerHTML=''; return; }
  const items=[[s.videos.toLocaleString(),L().kpiVideos],[s.creators,L().kpiCreators],
               [kfmt(s.play_med),L().kpiMed],[kfmt(s.play_max),L().kpiMax]];
  el.innerHTML = items.map(([n,l])=>`<div class="kpi"><div class="k-num">${n}</div><div class="k-lab">${l}</div></div>`).join('');
  el.style.display='grid';
}
function renderGrid(){
  const grid=document.getElementById('vgrid'); if(!grid) return;
  let vids=(STATE.videos||[]).slice();
  const q=(document.getElementById('vsearch').value||'').trim().toLowerCase();
  const plat=document.getElementById('vplat').value, sort=document.getElementById('vsort').value;
  if(plat!=='all') vids=vids.filter(v=>(v.platform||'')===plat);
  if(q) vids=vids.filter(v=>((v.title||'')+' '+(v.creator||'')).toLowerCase().includes(q));
  if(sort==='date') vids.sort((a,b)=>(b.published||'').localeCompare(a.published||''));
  else vids.sort((a,b)=>(Number(b[sort])||0)-(Number(a[sort])||0));
  document.getElementById('dcount').textContent = STATE.total ? L().vCount(STATE.total, STATE.total>300?300:0) : '';
  const more=document.getElementById('vmore');
  if(!vids.length){ grid.innerHTML=`<div class="empty">${L().emptyData}</div>`; more.style.display='none'; return; }
  const show=vids.slice(0, PAGE*pageN);
  const SL = (typeof lang!=='undefined'&&lang==='en') ? {p:'Views',l:'Likes',d:'Danmaku',c:'Comments'} : {p:'播放',l:'点赞',d:'弹幕',c:'评论'};
  grid.innerHTML = show.map(v=>{
    const yt=v.platform==='youtube', dur=hhmmss(v.duration_sec);
    const img = v.cover_url ? `<img src="${esc(v.cover_url)}" loading="lazy" referrerpolicy="no-referrer" onerror="this.classList.add('broken')">` : '';
    return `<a class="vcard" href="${esc(v.url||'#')}" target="_blank" rel="noopener noreferrer">
      <div class="thumb">${img}
        <span class="thumb-badge ${yt?'yt':'bili'}">${yt?'YT':'B站'}</span>
        ${dur?`<span class="thumb-dur">${dur}</span>`:''}
      </div>
      <div class="vmeta">
        <div class="vtitle">${esc(v.title||'')}</div>
        <div class="vsub">${esc(v.creator||'')} · ${v.published||''}</div>
        <div class="vstats">
          <span title="${SL.p}">${IC.play}${kfmt(v.play)}</span>
          ${yt ? `<span title="${SL.l}">${IC.like}${kfmt(v.like)}</span>`
               : `<span title="${SL.d}">${IC.danmaku}${kfmt(v.danmaku)}</span>`}
          <span title="${SL.c}">${IC.cmt}${kfmt(v.comment)}</span>
        </div>
      </div></a>`;
  }).join('');
  const left=vids.length-show.length;
  if(left>0){ more.style.display='inline-block'; more.textContent=L().showMore(left); }
  else more.style.display='none';
}

function openReport(){ window.open('/report','_blank'); }     /* 自包含 HTML 报告(跑过「抓取并分析」后生成) */
function openDiag(){ window.open('/diagnose','_blank'); }      /* 单视频体检页(选一条视频逐维度诊断) */
async function doImport(){
  const path=document.getElementById('imp').value.trim();
  if(!path){ toast(L().tNeedPath); return; }
  const r=await (await fetch('/api/import',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({path})})).json();
  if(r.ok){ toast(L().tImportOk(r.creators,r.videos)); await refreshStatus(); await loadData(); }
  else toast(L().tImportErr(r.error));
}

/* ——————————————————— boot ——————————————————— */
updateThemeBtn(); applyLang(); restorePlatforms(); refreshStatus(); loadData();
</script>
